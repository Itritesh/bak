<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium 3D Bakery Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ==================== RESET & VARIABLES ==================== */
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #050505;
  --amber: #f59e0b;
  --amber-dark: #d97706;
  --amber-light: #fde68a;
  --amber-muted: rgba(245, 158, 11, 0.15);
  --amber-border: rgba(245, 158, 11, 0.3);
  --white-5: rgba(255, 255, 255, 0.05);
  --white-10: rgba(255, 255, 255, 0.10);
  --white-20: rgba(255, 255, 255, 0.20);
  --gray-4: #9ca3af;
  --gray-5: #6b7280;
  --gray-6: #4b5563;
  --gray-7: #374151;
  --green: #22c55e;
  --red: #ef4444;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
  --radius-sm: 0.75rem;
  --radius: 1rem;
  --radius-lg: 1.5rem;
  --radius-xl: 2rem;
  --radius-2xl: 2.5rem;
  --shadow-amber: 0 20px 60px rgba(217, 119, 6, 0.2);
}

html {
  scroll-behavior: smooth;
}

body {
  background: var(--bg);
  color: #fff;
  font-family: var(--sans);
  overflow-x: hidden;
  min-height: 100vh;
}

a {
  text-decoration: none;
  color: inherit;
}

button {
  cursor: pointer;
  border: none;
  background: none;
  font-family: inherit;
}

input,
textarea,
select {
  font-family: inherit;
}

img {
  max-width: 100%;
}

::selection {
  background: rgba(245, 158, 11, 0.3);
  color: #fde68a;
}

/* Scrollbar */
::-webkit-scrollbar {
  width: 4px;
}

::-webkit-scrollbar-track {
  background: var(--white-5);
}

::-webkit-scrollbar-thumb {
  background: rgba(217, 119, 6, 0.4);
  border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover {
  background: rgba(217, 119, 6, 0.6);
}

/* ==================== TYPOGRAPHY ==================== */
.font-serif {
  font-family: var(--serif);
}

/* ==================== ANIMATIONS ==================== */
@keyframes gradient-shift {
  0% {
    background-position: 0% 50%;
  }

  50% {
    background-position: 100% 50%;
  }

  100% {
    background-position: 0% 50%;
  }
}

@keyframes fade-in {
  from {
    opacity: 0;
    transform: translateY(20px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fade-in-left {
  from {
    opacity: 0;
    transform: translateX(-30px);
  }

  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes fade-in-right {
  from {
    opacity: 0;
    transform: translateX(30px);
  }

  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes fade-in-scale {
  from {
    opacity: 0;
    transform: scale(0.9);
  }

  to {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes scroll-bounce {

  0%,
  100% {
    transform: translateY(0);
  }

  50% {
    transform: translateY(10px);
  }
}

@keyframes spin {
  from {
    transform: rotate(0deg);
  }

  to {
    transform: rotate(360deg);
  }
}

@keyframes slide-in {
  from {
    transform: translateX(120%);
    opacity: 0;
  }

  to {
    transform: translateX(0);
    opacity: 1;
  }
}

@keyframes slide-out {
  from {
    transform: translateX(0);
    opacity: 1;
  }

  to {
    transform: translateX(120%);
    opacity: 0;
  }
}

@keyframes shimmer {
  from {
    background-position: -200% center;
  }

  to {
    background-position: 200% center;
  }
}

.fade-in {
  animation: fade-in 0.7s ease both;
}

.fade-in-up {
  animation: fade-in 0.6s ease both;
}

.fade-in-left {
  animation: fade-in-left 0.7s ease both;
}

.fade-in-right {
  animation: fade-in-right 0.7s ease both;
}

.fade-in-scale {
  animation: fade-in-scale 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

.gradient-text {
  background: linear-gradient(to right, #fde68a, #f59e0b, #fde68a);
  background-size: 200% auto;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
  animation: gradient-shift 6s ease infinite;
}

/* ==================== NAVBAR ==================== */
.navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(0, 0, 0, 0.25);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--white-10);
}

.nav-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 1.5rem;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.cookie-svg {
  color: var(--amber);
  transition: transform 0.3s;
}

.nav-logo:hover .cookie-svg {
  transform: rotate(45deg);
}

.logo-text {
  font-family: var(--serif);
  font-style: italic;
  font-size: 1.4rem;
  font-weight: 700;
  background: linear-gradient(to right, #fde68a, var(--amber));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 2rem;
}

.nav-link {
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--gray-4);
  transition: color 0.2s;
  position: relative;
}

.nav-link:hover,
.nav-link.active {
  color: var(--amber);
}

.cart-icon-btn {
  position: relative;
  padding: 6px;
  color: var(--gray-4);
  transition: color 0.2s;
  display: flex;
  align-items: center;
}

.cart-icon-btn:hover {
  color: var(--amber);
}

.cart-badge {
  position: absolute;
  top: -4px;
  right: -4px;
  background: var(--amber-dark);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--bg);
}

/* Mobile menu */
.mobile-menu-btn {
  display: none;
  flex-direction: column;
  gap: 5px;
  padding: 6px;
  color: var(--gray-4);
}

.mobile-menu-btn span {
  display: block;
  width: 24px;
  height: 2px;
  background: currentColor;
  border-radius: 2px;
  transition: all 0.3s;
}

.mobile-menu-btn.open span:nth-child(1) {
  transform: rotate(45deg) translate(5px, 5px);
}

.mobile-menu-btn.open span:nth-child(2) {
  opacity: 0;
}

.mobile-menu-btn.open span:nth-child(3) {
  transform: rotate(-45deg) translate(5px, -5px);
}

.mobile-nav {
  display: none;
  flex-direction: column;
  background: rgba(0, 0, 0, 0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--white-10);
  padding: 0.5rem 1rem 1.5rem;
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.3s ease, padding 0.3s ease;
}

.mobile-nav.open {
  display: flex;
  max-height: 300px;
  padding: 0.5rem 1rem 1.5rem;
}

.mobile-link {
  padding: 1rem 0.75rem;
  font-size: 1rem;
  font-weight: 500;
  color: var(--gray-4);
  border-radius: var(--radius-sm);
  transition: all 0.2s;
}

.mobile-link:hover {
  background: var(--white-5);
  color: #fff;
}

/* ==================== LAYOUT HELPERS ==================== */
.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 1.5rem;
}

/* ==================== BUTTONS ==================== */
.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 28px;
  background: var(--amber-dark);
  color: #fff;
  font-weight: 700;
  font-size: 0.95rem;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow-amber);
  text-decoration: none;
}

.btn-primary:hover {
  background: var(--amber);
  transform: translateY(-1px);
}

.btn-primary:active {
  transform: scale(0.98);
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.btn-ghost {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 28px;
  background: var(--white-5);
  color: #fff;
  font-weight: 700;
  font-size: 0.95rem;
  border-radius: 50px;
  border: 1px solid var(--white-10);
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
}

.btn-ghost:hover {
  background: var(--white-10);
}

/* ==================== HERO ==================== */
.hero {
  position: relative;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.hero-canvas {
  position: absolute;
  inset: 0;
  width: 100% !important;
  height: 100% !important;
  z-index: 0;
}

.hero-content {
  position: relative;
  z-index: 1;
  text-align: center;
  max-width: 900px;
  padding: 0 1.5rem;
}

.badge {
  display: inline-block;
  padding: 6px 16px;
  margin-bottom: 1.5rem;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--amber);
  background: rgba(245, 158, 11, 0.1);
  border: 1px solid var(--amber-border);
  border-radius: 50px;
}

.hero-title {
  font-family: var(--serif);
  font-size: clamp(3rem, 8vw, 6rem);
  font-weight: 700;
  line-height: 1.1;
  color: #fff;
  margin-bottom: 1.5rem;
  letter-spacing: -0.02em;
}

.hero-desc {
  font-size: 1.125rem;
  color: var(--gray-4);
  max-width: 600px;
  margin: 0 auto 2.5rem;
  line-height: 1.7;
}

.hero-btns {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  flex-wrap: wrap;
}

.scroll-indicator {
  position: absolute;
  bottom: 2.5rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: var(--gray-5);
  animation: scroll-bounce 2s ease infinite;
}

.scroll-indicator span {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
}

.scroll-line {
  width: 1px;
  height: 48px;
  background: linear-gradient(to bottom, var(--amber), transparent);
}

/* ==================== FEATURES SECTION ==================== */
.features-section {
  padding: 6rem 0;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(4px);
}

.features-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 3rem;
}

.feature-item {
  text-align: center;
}

.feature-icon {
  width: 64px;
  height: 64px;
  background: var(--amber-muted);
  border: 1px solid var(--amber-border);
  border-radius: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.75rem;
  margin: 0 auto 1.5rem;
}

.feature-item h3 {
  font-size: 1.125rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 0.75rem;
}

.feature-item p {
  color: var(--gray-4);
  line-height: 1.6;
}

/* ==================== SECTION HELPERS ==================== */
.section-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 3rem;
  gap: 1rem;
  flex-wrap: wrap;
}

.section-title {
  font-size: 2.5rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 0.5rem;
}

.section-subtitle {
  color: var(--gray-4);
}

.link-amber {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--amber);
  font-weight: 700;
  font-size: 0.9rem;
  transition: color 0.2s;
}

.link-amber:hover {
  color: var(--amber-light);
}

/* ==================== FEATURED / PRODUCTS SECTION ==================== */
.featured-section {
  padding: 6rem 0;
}

.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 2rem;
}

/* ==================== PRODUCT CARD ==================== */
.product-card {
  background: var(--white-5);
  backdrop-filter: blur(12px);
  border: 1px solid var(--white-10);
  border-radius: var(--radius-xl);
  overflow: hidden;
  transition: all 0.4s ease;
  position: relative;
}

.product-card:hover {
  background: var(--white-10);
  border-color: var(--amber-border);
  transform: translateY(-4px);
}

.product-canvas-wrapper {
  height: 260px;
  position: relative;
  cursor: grab;
  background: rgba(0, 0, 0, 0.3);
}

.product-canvas-wrapper:active {
  cursor: grabbing;
}

.orbit-hint {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 2;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(8px);
  border: 1px solid var(--white-10);
  border-radius: 50%;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--amber);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

.product-card:hover .orbit-hint {
  opacity: 1;
}

.product-canvas {
  width: 100% !important;
  height: 100% !important;
  display: block;
}

.product-info {
  padding: 1.5rem;
}

.product-name {
  font-size: 1.2rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 0.4rem;
  transition: color 0.2s;
}

.product-card:hover .product-name {
  color: var(--amber);
}

.product-desc {
  font-size: 0.875rem;
  color: var(--gray-4);
  line-height: 1.5;
  margin-bottom: 1rem;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.product-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}

.product-price {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--amber);
}

.quantity-control {
  display: flex;
  align-items: center;
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid var(--white-5);
  border-radius: 50px;
  padding: 2px 4px;
}

.qty-btn {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--gray-4);
  font-size: 1.1rem;
  border-radius: 50%;
  transition: color 0.2s;
}

.qty-btn:hover {
  color: var(--amber);
}

.qty-value {
  width: 32px;
  text-align: center;
  font-size: 0.875rem;
  font-weight: 600;
}

.btn-add-cart {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px;
  background: var(--amber-dark);
  color: #fff;
  font-weight: 700;
  font-size: 0.9rem;
  border-radius: 0.75rem;
  transition: all 0.2s;
  box-shadow: 0 8px 24px rgba(217, 119, 6, 0.2);
}

.btn-add-cart:hover {
  background: var(--amber);
  transform: translateY(-1px);
}

.btn-add-cart:active {
  transform: scale(0.98);
}

/* ==================== PAGE: PRODUCTS ==================== */
.page-products {
  padding-top: 8rem;
  padding-bottom: 6rem;
  min-height: 100vh;
}

.page-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 3rem;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.page-title {
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 700;
  color: #fff;
  margin-bottom: 0.5rem;
}

.products-controls {
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
}

.search-wrap {
  position: relative;
}

.search-icon {
  position: absolute;
  left: 1rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gray-5);
  pointer-events: none;
  transition: color 0.2s;
}

.search-wrap:focus-within .search-icon {
  color: var(--amber);
}

.search-input {
  background: var(--white-5);
  border: 1px solid var(--white-10);
  border-radius: 1rem;
  padding: 10px 1rem 10px 2.75rem;
  color: #fff;
  font-size: 0.875rem;
  width: 240px;
  outline: none;
  transition: border-color 0.2s;
}

.search-input:focus {
  border-color: rgba(245, 158, 11, 0.5);
}

.search-input::placeholder {
  color: var(--gray-5);
}

.cat-tabs {
  display: flex;
  align-items: center;
  gap: 2px;
  background: var(--white-5);
  border: 1px solid var(--white-10);
  border-radius: 1rem;
  padding: 3px;
}

.cat-tab {
  padding: 8px 20px;
  border-radius: 0.75rem;
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--gray-4);
  transition: all 0.2s;
}

.cat-tab:hover {
  color: #fff;
}

.cat-tab.active {
  background: var(--amber-dark);
  color: #fff;
  box-shadow: 0 4px 12px rgba(217, 119, 6, 0.3);
}

.empty-msg {
  grid-column: 1/-1;
  text-align: center;
  padding: 6rem 0;
  color: var(--gray-5);
  font-size: 1.125rem;
}

/* ==================== PAGE: ABOUT ==================== */
.page-about {
  padding-top: 8rem;
  padding-bottom: 6rem;
  min-height: 100vh;
}

.about-hero {
  text-align: center;
  margin-bottom: 6rem;
}

.about-desc {
  font-size: 1.2rem;
  color: var(--gray-4);
  max-width: 700px;
  margin: 1rem auto 0;
  line-height: 1.7;
}

.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6rem;
  align-items: center;
  margin-bottom: 6rem;
}

.about-text {
  space-y: 2rem;
}

.about-text h2 {
  font-size: 2.25rem;
  margin-bottom: 1.5rem;
}

.about-text p {
  color: var(--gray-4);
  line-height: 1.7;
  margin-bottom: 1rem;
}

.about-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2rem;
  padding-top: 2rem;
}

.stat-num {
  display: block;
  font-size: 2rem;
  font-weight: 700;
  color: var(--amber);
}

.stat-label {
  display: block;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--gray-5);
  margin-top: 4px;
}

.about-scene-wrap {
  position: relative;
}

.about-canvas-container {
  aspect-ratio: 1;
  background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), transparent);
  border: 1px solid var(--white-10);
  border-radius: 3rem;
  overflow: hidden;
  background-color: rgba(0, 0, 0, 0.4);
}

.about-canvas {
  width: 100% !important;
  height: 100% !important;
  display: block;
}

.about-badge {
  position: absolute;
  font-size: 2rem;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px);
  border: 1px solid var(--white-10);
  width: 72px;
  height: 72px;
  border-radius: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
}

.about-badge-heart {
  top: -1.5rem;
  right: -1.5rem;
  background: var(--amber-dark);
  border-color: var(--amber);
  transform: rotate(12deg);
}

.about-badge-users {
  bottom: -1.5rem;
  left: -1.5rem;
  transform: rotate(-12deg);
}

.values-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 2rem;
}

.value-card {
  background: var(--white-5);
  border: 1px solid var(--white-10);
  padding: 2.5rem;
  border-radius: 2.5rem;
  text-align: center;
  transition: all 0.4s;
}

.value-card:hover {
  background: var(--white-10);
  transform: translateY(-4px);
}

.value-icon {
  width: 64px;
  height: 64px;
  background: var(--amber-muted);
  border-radius: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.75rem;
  margin: 0 auto 1.5rem;
}

.value-card h3 {
  font-size: 1.1rem;

/* ==================== CART ==================== */
const Cart = {
  items: JSON.parse(localStorage.getItem('bakery-cart') || '[]'),
  _save() {
    localStorage.setItem('bakery-cart', JSON.stringify(this.items));
    updateCartBadge();
  },
  addItem(product, qty = 1) {
    const ex = this.items.find(i => i.id === product.id);
    if (ex) ex.quantity += qty;
    else this.items.push({ ...product, quantity: qty });
    this._save();
  },
  removeItem(id) {
    this.items = this.items.filter(i => i.id !== id);
    this._save();
  },
  updateQuantity(id, qty) {
    const item = this.items.find(i => i.id === id);
    if (item) { item.quantity = Math.max(1, qty); this._save(); }
  },
  clearCart() { this.items = []; this._save(); },
  getTotal() { return this.items.reduce((s, i) => s + i.price * i.quantity, 0); },
  getCount() { return this.items.reduce((s, i) => s + i.quantity, 0); },
};

function updateCartBadge() {
  const badge = document.getElementById('cart-badge');
  const count = Cart.getCount();
  if (!badge) return;
  badge.textContent = count;
  badge.style.display = count > 0 ? 'flex' : 'none';
}

  const el = document.createElement('div');

  el.innerHTML = `<span>${msg}</span><button class="toast-close" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById('toast-container').appendChild(el);
  const remove = () => {
    el.classList.add('toast-exit');
    setTimeout(() => el.remove(), 300);
  };
  setTimeout(remove, 3500);
}

function makeCookie(color = '#8B4513', name = '') {
  const g = new THREE.Group();
  const n = name.toLowerCase();
  const isChoco = n.includes('choco');
  const isWalnut = n.includes('walnut');
  const isMuesli = n.includes('muesli');
  const isShrewsbury = n.includes('shrewsbury');

  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(1, 1, 0.22, 32),
    new THREE.MeshStandardMaterial({ color: new THREE.Color(color), roughness: 0.9, metalness: 0.05 })
  );
  body.castShadow = true; body.receiveShadow = true;
  g.add(body);

  const count = isShrewsbury ? 0 : isMuesli ? 15 : 8;
  const tc = isChoco ? '#1a0f0a' : isWalnut ? '#704214' : '#d2b48c';
  const tmat = new THREE.MeshStandardMaterial({ color: tc, roughness: 0.6 });

  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;
    const r = 0.3 + Math.random() * 0.4;
    const tgeo = isWalnut
      ? new THREE.BoxGeometry(0.2, 0.1, 0.15)
      : new THREE.SphereGeometry(isMuesli ? 0.05 : 0.1, 8, 8);
    const t = new THREE.Mesh(tgeo, tmat);
    t.position.set(Math.cos(angle) * r, 0.12, Math.sin(angle) * r);
    t.rotation.set(Math.random() * 2, Math.random() * 2, Math.random() * 2);
    g.add(t);
  }
  return g;
}

function makeStick(color = '#D2B48C') {
  const g = new THREE.Group();
  g.rotation.x = Math.PI / 4;
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.15, 0.15, 2.5, 16),
    new THREE.MeshStandardMaterial({ color: new THREE.Color(color), roughness: 1, metalness: 0 })
  );
  body.castShadow = true;
  g.add(body);
  const crumbMat = new THREE.MeshStandardMaterial({ color: '#F5DEB3' });
  for (let i = 0; i < 12; i++) {
    const c = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.15, 0.05), crumbMat);
    c.position.set((Math.random() - .5) * .2, (Math.random() - .5) * 2, (Math.random() - .5) * .2);
    c.rotation.set(Math.random() * 2, Math.random() * 2, Math.random() * 2);
    g.add(c);
  }
  return g;
}

function makeStars(scene, count = 2500) {
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    pos[i * 3] = (Math.random() - .5) * 200;
    pos[i * 3 + 1] = (Math.random() - .5) * 200;
    pos[i * 3 + 2] = -(Math.random() * 120 + 40);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const pts = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.25, transparent: true, opacity: 0.7 }));
  scene.add(pts);
  return pts;
}

function makeSparkles(scene, count = 60) {
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    pos[i * 3] = (Math.random() - .5) * 22;
    pos[i * 3 + 1] = (Math.random() - .5) * 18;
    pos[i * 3 + 2] = (Math.random() - .5) * 10 - 5;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const pts = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xF5DEB3, size: 0.15, transparent: true, opacity: 0.9 }));
  scene.add(pts);
}

/* ==================== SCENE: HERO ==================== */
function initHeroScene(canvas) {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
  renderer.setSize(w, h);
  renderer.shadowMap.enabled = true;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 300);
  camera.position.set(0, 0, 8);

  setupLights(scene);
  makeStars(scene, 5000);
  makeSparkles(scene);

  const floaters = [];
  const cookieColors = ['#8B4513', '#DEB887', '#D2691E'];
  for (let i = 0; i < 3; i++) {
    const m = makeCookie(cookieColors[i]);
    m.position.set((Math.random() - .5) * 9, (Math.random() - .5) * 7, (Math.random() - .5) * 4 - 2);
    m.scale.setScalar(0.7 + Math.random() * 0.8);
    scene.add(m);
    floaters.push({ m, spd: 0.4 + Math.random() * 0.5, off: Math.random() * Math.PI * 2 });
  }
  for (let i = 0; i < 2; i++) {
    const m = makeStick('#D2B48C');
    m.position.set((Math.random() - .5) * 9, (Math.random() - .5) * 7, (Math.random() - .5) * 4);
    m.scale.setScalar(0.7 + Math.random() * 0.4);
    scene.add(m);
    floaters.push({ m, spd: 0.3 + Math.random() * 0.4, off: Math.random() * Math.PI * 2 });
  }
  // tiny chips
  for (let i = 0; i < 15; i++) {
    const chip = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshStandardMaterial({ color: '#1a0f0a' }));
    chip.position.set((Math.random() - .5) * 14, (Math.random() - .5) * 12, (Math.random() - .5) * 8);
    scene.add(chip);
    floaters.push({ m: chip, spd: 1 + Math.random(), off: Math.random() * Math.PI * 2, tiny: true });
  }

  const clock = new THREE.Clock();
  let raf;
  const tick = () => {
    raf = requestAnimationFrame(tick);
    const t = clock.getElapsedTime();
    floaters.forEach(({ m, spd, off, tiny }) => {
      m.rotation.y += 0.005 * spd;
      if (!tiny) { m.rotation.x += 0.002 * spd; m.position.y += Math.sin(t * spd + off) * 0.003; }
    });
    renderer.render(scene, camera);
  };
  tick();

  const onResize = () => {
    const w = canvas.clientWidth, h = canvas.clientHeight;
    camera.aspect = w / h; camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  };
  window.addEventListener('resize', onResize);

  const dispose = () => { cancelAnimationFrame(raf); window.removeEventListener('resize', onResize); renderer.dispose(); };
  trackDispose(dispose);
  return dispose;
}

/* ==================== SCENE: PRODUCT CARD ==================== */
function initProductScene(canvas, product) {
  const w = canvas.clientWidth || 300;
  const h = canvas.clientHeight || 260;

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(w, h);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 100);
  camera.position.set(0, 0, 4);

  setupLights(scene);

  // Shadow plane
  const plane = new THREE.Mesh(
    new THREE.PlaneGeometry(12, 12),
    new THREE.ShadowMaterial({ opacity: 0.25 })
  );
  plane.rotation.x = -Math.PI / 2; plane.position.y = -1.8; plane.receiveShadow = true;
  scene.add(plane);

  const model = product.modelType === 'cookie'
    ? makeCookie(product.color, product.name)
    : makeStick(product.color);
  model.rotation.x = 0.2;
  model.scale.setScalar(product.modelType === 'cookie' ? 1.2 : 0.8);
  scene.add(model);

  const controls = new OrbitControls(camera, canvas);
  controls.enableZoom = false; controls.enablePan = false;
  controls.autoRotate = true; controls.autoRotateSpeed = 1.5;
  controls.enableDamping = true; controls.dampingFactor = 0.06;

  let hovered = false;
  canvas.addEventListener('mouseenter', () => { hovered = true; controls.autoRotate = false; });
  canvas.addEventListener('mouseleave', () => { hovered = false; controls.autoRotate = true; });

  const clock = new THREE.Clock();
  let raf;
  const tick = () => {
    raf = requestAnimationFrame(tick);
    const t = clock.getElapsedTime();
    if (!hovered) {
      const s = 1 + Math.sin(t * 2) * 0.018;
      model.scale.setScalar(s * (product.modelType === 'cookie' ? 1.2 : 0.8));
    }
    controls.update();
    renderer.render(scene, camera);
  };
  tick();

  const dispose = () => { cancelAnimationFrame(raf); controls.dispose(); renderer.dispose(); };
  trackDispose(dispose);
}

function initFooterScene(canvas) {
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });

  const scene = new THREE.Scene();

  let raf;

}

function initAboutScene(canvas) {
  const w = canvas.clientWidth || 400, h = canvas.clientHeight || 400;
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(w, h);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 100);
  camera.position.set(0, 0, 5);
  setupLights(scene);

  const items = [];
  const c1 = makeCookie('#8B4513'); c1.position.set(0, .5, 0); c1.scale.setScalar(1.2); scene.add(c1);
  items.push({ m: c1, spd: 2, off: 0 });
  const st = makeStick('#D2B48C'); st.position.set(1, -1, .5); st.scale.setScalar(.8); scene.add(st);
  items.push({ m: st, spd: 1.5, off: 1 });
  const c2 = makeCookie('#DEB887'); c2.position.set(-1.2, -.5, -.5); c2.scale.setScalar(.7); scene.add(c2);
  items.push({ m: c2, spd: 2.5, off: 2 });

  const controls = new OrbitControls(camera, canvas);
  controls.enableZoom = false; controls.enableDamping = true; controls.dampingFactor = 0.05;

  const clock = new THREE.Clock();

  const tick = () => {

    const t = clock.getElapsedTime();
    items.forEach(({ m, spd, off }) => {

      m.position.y += Math.sin(t * spd + off) * 0.003;
    });

  trackDispose(dispose);
}

/* ==================== CONFETTI ==================== */
function launchConfetti() {
  const cv = document.createElement('canvas');
  cv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998';
  cv.width = innerWidth; cv.height = innerHeight;
  document.body.appendChild(cv);
  const ctx = cv.getContext('2d');
  const colors = ['#f59e0b', '#d97706', '#fde68a', '#ff6b6b', '#4ecdc4', '#a78bfa', '#34d399'];
  const particles = Array.from({ length: 160 }, () => ({
    x: Math.random() * innerWidth,
    y: Math.random() * -300 - 20,
    vx: (Math.random() - .5) * 4,
    vy: Math.random() * 5 + 2,
    r: Math.random() * 8 + 4,
    rot: Math.random() * 360,
    rotSpd: (Math.random() - .5) * 8,
    color: colors[Math.floor(Math.random() * colors.length)],
  }));
  const end = Date.now() + 5000;
  const draw = () => {
    ctx.clearRect(0, 0, cv.width, cv.height);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.rot += p.rotSpd;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.r / 2, -p.r / 4, p.r, p.r / 2);
      ctx.restore();
    });
    if (Date.now() < end) requestAnimationFrame(draw);
    else cv.remove();
  };
  requestAnimationFrame(draw);
}

function mountProductScenes(products) {
  const quantities = {};
  products.forEach(p => {
    quantities[p.id] = 1;
    const canvas = document.getElementById(`cv-${p.id}`);
    if (!canvas) return;
    const wrapper = canvas.parentElement;
    const w = wrapper.clientWidth || 300;
    canvas.width = w; canvas.height = 260;
    initProductScene(canvas, p);
  });

  // Qty controls
  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.pid;
      if (btn.dataset.action === 'plus') quantities[id] = (quantities[id] || 1) + 1;
      else quantities[id] = Math.max(1, (quantities[id] || 1) - 1);
      const el = document.getElementById(`qv-${id}`);
      if (el) el.textContent = quantities[id];
    });
  });

  // Add to cart
  document.querySelectorAll('[data-add]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.add;
      const product = PRODUCTS.find(p => p.id === id);
      const qty = quantities[id] || 1;
      if (product) { Cart.addItem(product, qty); showToast(`Added ${qty}× ${product.name} to cart! 🍪`); }
    });
  });
}

async function handlePayment(e) {
  e.preventDefault();
  const btn = document.getElementById('pay-btn');
  const total = Cart.getTotal();

  if (total === 0) {
    showToast('Your cart is empty', 'error');
    return;
  }

  btn.disabled = true;
  const originalText = btn.innerHTML;
  btn.innerHTML = '<div class="spinner"></div> Processing...';

  try {
    // Load Razorpay script if not loaded
    if (!window.Razorpay) {
      showToast('Loading payment gateway...', 'info');
      await new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://checkout.razorpay.com/v1/checkout.js';
        script.onload = resolve;
        script.onerror = () => reject(new Error('Failed to load Razorpay'));
        document.head.appendChild(script);
      });
    }

    // Fetch Razorpay config
    showToast('Initializing payment...', 'info');
    const configResponse = await fetch('/api/config');
    if (!configResponse.ok) {
      const configError = await configResponse.json().catch(() => ({}));
      throw new Error(configError.error || 'Payment configuration failed');
    }
    const { razorpayKeyId } = await configResponse.json();

    // Create order
    const orderResponse = await fetch('/api/create-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ amount: total }),
    });

    if (!orderResponse.ok) {
      const errorData = await orderResponse.json();
      throw new Error(errorData.error || 'Order creation failed');
    }

    const order = await orderResponse.json();

    // Get form data
    const formData = new FormData(e.target);
    const customerInfo = {
      name: formData.get('name'),
      email: formData.get('email'),
      contact: formData.get('phone'),
    };

    // Razorpay options
    const options = {
      key: razorpayKeyId,
      amount: order.amount,
      currency: order.currency,
      name: 'Premium 3D Bakery',
      description: `Order #${order.receipt}`,
      order_id: order.id,
      prefill: customerInfo,
      theme: { color: '#d97706' },
      handler: async (response) => {
        try {
          showToast('Verifying payment...', 'info');

          const verifyResponse = await fetch('/api/verify-payment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(response),
          });

          const verifyResult = await verifyResponse.json();

          if (verifyResult.success) {
            Cart.clearCart();
            showToast('Payment successful! Redirecting...', 'success');
            setTimeout(() => Router.navigate('#/success'), 1500);
          } else {
            throw new Error(verifyResult.message || 'Payment verification failed');
          }
        } catch (error) {
          console.error('Verification error:', error);
          showToast('Payment verification failed. Please contact support.', 'error');
        }
      },
      modal: {
        ondismiss: () => {
          showToast('Payment cancelled', 'info');
        }
      }
    };

    // Open Razorpay checkout
    const razorpayInstance = new window.Razorpay(options);
    razorpayInstance.open();

  } catch (error) {
    console.error('Payment error:', error);
    let message = 'Something went wrong. Please try again.';

    if (error.message.includes('configuration')) {
      message = 'Payment gateway not configured. Please contact support.';
    } else if (error.message.includes('network') || error.message.includes('fetch')) {
      message = 'Network error. Please check your connection.';
    } else if (error.message) {
      message = error.message;
    }

    showToast(message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalText;
  }
}

/* ==================== ROUTER ==================== */
const Router = {
  navigate(hash) {
    disposeAllScenes();
    const path = hash.replace('#', '') || '/';
    window.scrollTo(0, 0);

    // Active nav link
    document.querySelectorAll('.nav-link, .mobile-link').forEach(a => {
      const h = a.getAttribute('href');
      a.classList.toggle('active', h === hash || (hash === '' && h === '#/'));
    });

    switch (path) {
      case '/': renderHome(); break;
      case '/products': renderProducts(); break;
      case '/about': renderAbout(); break;
      case '/cart': renderCart(); break;
      case '/checkout': renderCheckout(); break;
      case '/success': renderSuccess(); break;
      default: renderHome();
    }

    updateCartBadge();
    // Close mobile nav
    document.getElementById('mobile-nav')?.classList.remove('open');
    document.getElementById('mobile-menu-btn')?.classList.remove('open');
  },

  init() {
    window.addEventListener('hashchange', () => this.navigate(location.hash));
    this.navigate(location.hash || '#/');
  }
};

/* ==================== MOBILE MENU ==================== */
const mBtn = document.getElementById('mobile-menu-btn');
mBtn?.addEventListener('click', () => {
  mBtn.classList.toggle('open');
  document.getElementById('mobile-nav')?.classList.toggle('open');
});

const footerCanvas = document.getElementById('footer-canvas');

/* ==================== BOOT ==================== */
Router.init();
